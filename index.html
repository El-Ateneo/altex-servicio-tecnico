<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Altex - Micro-Electrónica de Precisión</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        goldLight: '#F3E5AB',
                        goldDark: '#AA8822',
                        darkBg: '#050505'
                    },
                    fontFamily: {
                        cyber: ['Rajdhani', 'sans-serif'],
                        logo: ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --gold-glow: rgba(212, 175, 55, 0.6);
            --glass-bg: rgba(15, 15, 15, 0.7);
        }

        body { 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            font-family: 'Rajdhani', sans-serif; 
            color: white;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        .main-frame {
            width: 100%;
            max-width: 450px;
            height: auto;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
            position: relative;
            border-left: 1px solid rgba(212, 175, 55, 0.05);
            border-right: 1px solid rgba(212, 175, 55, 0.05);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(1px 1px at 20px 30px, #D4AF37, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            opacity: 0.15;
            z-index: 0;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
        }
        
        .logo-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            filter: blur(30px);
            animation: auraPulse 3s ease-in-out infinite;
            z-index: 0;
            opacity: 0.6;
        }

        .logo-img {
            max-width: 155px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(212, 175, 0, 0.4));
            animation: logoFloat 4s ease-in-out infinite;
        }

        @keyframes auraPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.8; }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }

        .tech-card {
            background: var(--glass-bg);
            border: 1px solid rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        .tech-card:active { transform: scale(0.96); border-color: #D4AF37; background: rgba(212, 175, 55, 0.05); }

        .magic-tip-box {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .step-dot { 
            width: 6px; 
            height: 6px; 
            border-radius: 50%; 
            background: rgba(255, 255, 255, 0.05); 
            transition: all 0.4s ease; 
        }
        .step-dot.active { 
            background: #D4AF37; 
            box-shadow: 0 0 12px #D4AF37; 
            transform: scale(1.6); 
        }
        .step-label { 
            font-size: 7px; 
            text-transform: uppercase; 
            letter-spacing: 0.25em; 
            color: rgba(255, 255, 255, 0.2); 
            font-weight: 700;
        }
        .step-label.active { color: #D4AF37; }

        .markdown-content h4 { color: #D4AF37; font-weight: 700; margin-top: 1rem; margin-bottom: 0.4rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 4px; }
        .markdown-content p { margin-bottom: 0.6rem; color: rgba(255,255,255,0.9); font-size: 0.95rem; line-height: 1.4; }
        .markdown-content li { position: relative; padding-left: 1rem; margin-bottom: 0.2rem; font-size: 0.9rem; color: rgba(255,255,255,0.8); }
        .markdown-content li::before { content: '-'; position: absolute; left: 0; color: #D4AF37; }
        
        .whatsapp-btn {
            background: #25D366;
            color: white;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .whatsapp-btn:active { transform: scale(0.98); filter: brightness(0.9); }

        .closing-guard {
            padding: 2.5rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: auto;
        }
        .guard-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
        }
        .guard-icon {
            font-size: 11px;
            margin: 12px 0;
            letter-spacing: 1.2em;
            font-weight: 900;
            text-indent: 1.2em;
            background: linear-gradient(90deg, 
                rgba(212, 175, 55, 0.3) 0%, 
                rgba(212, 175, 55, 1) 50%, 
                rgba(212, 175, 55, 0.3) 100%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shineText 4s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #D4AF37;
            box-shadow: 0 0 15px #D4AF37;
            top: 0;
            left: 0;
            animation: scanMove 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes scanMove {
            0%, 100% { top: 0%; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="container" class="main-frame">
        <div class="stars"></div>

        <div class="relative z-10 flex flex-col h-full">
            
            <!-- Header -->
            <div class="pt-8 pb-4 text-center shrink-0">
                <div onclick="resetUI()" class="logo-container mb-1">
                    <div class="logo-aura"></div>
                    <img src="https://res.cloudinary.com/dl81eetla/image/upload/q_auto/f_auto/v1775768400/logo2_rfm9jf.png" alt="Altex" class="logo-img mx-auto">
                </div>
                
                <div class="flex justify-center items-center gap-6 mt-2">
                    <div class="flex flex-col items-center gap-1.5">
                        <div id="dot-1" class="step-dot active"></div>
                        <span id="label-1" class="step-label active">Inicio</span>
                    </div>
                    <div class="w-6 h-[1px] bg-white/5"></div>
                    <div class="flex flex-col items-center gap-1.5">
                        <div id="dot-2" class="step-dot"></div>
                        <span id="label-2" class="step-label">Consulta</span>
                    </div>
                    <div class="w-6 h-[1px] bg-white/5"></div>
                    <div class="flex flex-col items-center gap-1.5">
                        <div id="dot-3" class="step-dot"></div>
                        <span id="label-3" class="step-label">Informe</span>
                    </div>
                </div>
            </div>

            <!-- Contenido Dinámico -->
            <div class="px-6 flex-grow">
                
                <!-- PASO 1: SELECCIÓN -->
                <div id="main-panel" class="space-y-6 animate-in fade-in duration-700">
                    <div class="text-center pt-2">
                        <h2 class="text-[10px] font-bold uppercase tracking-[0.6em] text-gold/40 mb-1">Precisión e Innovación</h2>
                        <p class="text-xl font-light tracking-tight text-white/80 font-cyber">¿Qué vamos a reparar hoy?</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="startProcess('Smartphone')" class="tech-card p-8 rounded-[2.5rem] flex flex-col items-center gap-4 group">
                            <i class="fa-solid fa-mobile-screen text-3xl text-gold/70 transition-transform group-hover:scale-110"></i>
                            <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-white/70">Celulares</span>
                        </button>
                        <button onclick="startProcess('Laptop')" class="tech-card p-8 rounded-[2.5rem] flex flex-col items-center gap-4 group">
                            <i class="fa-solid fa-laptop text-3xl text-gold/70 transition-transform group-hover:scale-110"></i>
                            <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-white/70">Notebooks</span>
                        </button>
                        <button onclick="startProcess('Consola')" class="tech-card p-8 rounded-[2.5rem] flex flex-col items-center gap-4 group">
                            <i class="fa-solid fa-gamepad text-3xl text-gold/70 transition-transform group-hover:scale-110"></i>
                            <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-white/70">Consolas</span>
                        </button>
                        <button onclick="startProcess('Hardware')" class="tech-card p-8 rounded-[2.5rem] flex flex-col items-center gap-4 group">
                            <i class="fa-solid fa-microchip text-3xl text-gold/70 transition-transform group-hover:scale-110"></i>
                            <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-white/70">Placas</span>
                        </button>
                    </div>

                    <!-- RECOMENDACIONES -->
                    <div class="magic-tip-box mt-4">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-1.5 h-1.5 bg-gold rounded-full"></div>
                            <span class="text-[10px] font-bold text-gold/70 uppercase tracking-widest">Altex Tip</span>
                        </div>
                        <p id="dynamic-tip" class="text-[13px] text-white/50 leading-relaxed italic transition-all duration-700 min-h-[40px]">
                            Diagnóstico especializado de alta precisión.
                        </p>
                    </div>

                    <!-- Separador Sutil -->
                    <div class="flex items-center justify-center py-2 px-10">
                        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
                    </div>

                    <!-- BOTÓN DE ACCIÓN -->
                    <div class="pb-2">
                        <button onclick="directWhatsApp()" class="whatsapp-btn w-full py-5 rounded-2xl flex items-center justify-center gap-4 shadow-lg active:scale-[0.98]">
                            <i class="fa-brands fa-whatsapp text-2xl"></i>
                            <span class="text-[15px] font-bold tracking-wider">CONSULTA DIRECTA</span>
                        </button>
                    </div>
                </div>

                <!-- PASO 2: ANÁLISIS -->
                <div id="scan-panel" class="hidden space-y-7 pt-2">
                    <div class="flex items-center gap-5 bg-white/5 p-5 rounded-3xl border border-white/10 relative overflow-hidden">
                        <div id="scan-line" class="scan-line hidden"></div>
                        <button onclick="resetUI()" class="text-gold bg-gold/10 w-11 h-11 rounded-2xl flex items-center justify-center border border-gold/20 active:scale-90 transition-transform">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div>
                            <h3 class="text-gold font-bold uppercase tracking-[0.2em] text-[11px]" id="device-title">Equipo</h3>
                            <p class="text-[9px] text-white/40 uppercase tracking-[0.3em] font-medium">Análisis de Sistema</p>
                        </div>
                    </div>

                    <div id="input-section" class="space-y-5">
                        <p class="text-center text-[15px] text-white/70 font-cyber tracking-wide">Describe el problema:</p>
                        <textarea id="issue-input" rows="5" class="w-full bg-black/60 border border-white/10 rounded-3xl p-6 text-white text-md focus:border-gold/40 outline-none resize-none placeholder:text-white/10 transition-colors" placeholder="Ej: No enciende o no da imagen..."></textarea>
                        
                        <button id="scan-btn" onclick="performAIAnalysis()" class="w-full bg-gold text-black font-extrabold py-5 rounded-3xl flex items-center justify-center gap-4 active:scale-95 transition-all shadow-[0_5px_20px_rgba(212,175,55,0.2)]">
                            <i class="fa-solid fa-microchip text-lg"></i>
                            <span id="btn-text" class="text-xs uppercase tracking-[0.2em]">Analizar Equipo</span>
                        </button>
                    </div>

                    <!-- PASO 3: INFORME -->
                    <div id="result-area" class="hidden space-y-6">
                        <div class="p-7 bg-white/[0.03] border border-gold/20 rounded-[40px] backdrop-blur-2xl shadow-inner">
                            <div class="flex items-center gap-3 mb-5">
                                <i class="fa-solid fa-microchip text-gold text-lg"></i>
                                <span class="text-[11px] font-bold text-gold uppercase tracking-[0.2em]">Diagnóstico Altex</span>
                            </div>
                            <div id="ai-response" class="markdown-content"></div>
                        </div>

                        <div class="flex flex-col gap-4 pb-6">
                            <button onclick="sendWhatsApp()" class="whatsapp-btn w-full py-5 rounded-2xl flex items-center justify-center gap-4 transition-all">
                                <i class="fa-brands fa-whatsapp text-2xl"></i>
                                <span class="text-sm font-bold tracking-wide">Solicitar Reparación</span>
                            </button>
                            <button onclick="newAnalysis()" class="text-[10px] uppercase tracking-[0.5em] text-white/30 font-bold py-3 hover:text-white/50 transition-colors">Volver a intentar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Guarda Estética de Cierre -->
            <div class="closing-guard shrink-0">
                <div class="guard-line"></div>
                <div class="guard-icon">ALTEX</div>
                <div class="guard-line"></div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const tips = [
            "🔋 Evite que su batería baje del 15%.",
            "💨 El aire comprimido es ideal para ventiladores.",
            "✨ Limpie su pantalla solo con microfibra.",
            "⚡ Los cargadores genéricos dañan circuitos.",
            "💻 Los discos SSD aceleran cualquier equipo.",
            "🛠️ El mantenimiento anual evita fallos graves.",
            "🔌 Use estabilizadores de tensión."
        ];

        let selectedDevice = "";

        function updateSteps(step) {
            for(let i=1; i<=3; i++) {
                const dot = document.getElementById(`dot-${i}`);
                const label = document.getElementById(`label-${i}`);
                if(i === step) {
                    dot.classList.add('active');
                    label.classList.add('active');
                } else {
                    dot.classList.remove('active');
                    label.classList.remove('active');
                }
            }
        }

        function startProcess(dev) {
            selectedDevice = dev;
            document.getElementById('main-panel').classList.add('hidden');
            document.getElementById('scan-panel').classList.remove('hidden');
            document.getElementById('device-title').innerText = dev;
            newAnalysis();
        }

        function resetUI() {
            document.getElementById('main-panel').classList.remove('hidden');
            document.getElementById('scan-panel').classList.add('hidden');
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('input-section').classList.remove('hidden');
            document.getElementById('issue-input').value = "";
            updateSteps(1);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function newAnalysis() {
            document.getElementById('input-section').classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('issue-input').value = "";
            document.getElementById('scan-line').classList.add('hidden');
            updateSteps(2);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function performAIAnalysis() {
            const issue = document.getElementById('issue-input').value.trim();
            if (!issue) return;

            const btn = document.getElementById('scan-btn');
            const scanLine = document.getElementById('scan-line');
            
            btn.disabled = true;
            document.getElementById('btn-text').innerText = "PROCESANDO...";
            scanLine.classList.remove('hidden');

            const prompt = `Identidad: Altex Micro-Electrónica. 
            Equipo: ${selectedDevice}. 
            Problema: "${issue}". 
            
            REGLA ESTRICTA: Responde con máxima precisión y brevedad. Sin introducciones.
            Formato:
            #### Causa detectada
            Explicación en una sola frase corta.
            
            #### Acción técnica
            Resumen directo del trabajo a realizar.`;

            try {
                const response = await fetch("/api/ai", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });
        
                const textResponse = await response.text();
        
                let data;
                try {
                    data = JSON.parse(textResponse);
                } catch (e) {
                    console.error("Respuesta inválida:", textResponse);
                    throw new Error("Error del servidor");
                }
        
                if (!response.ok) {
                    console.error("Error backend:", data);
                    throw new Error(data.error?.message || "Error");
                }
        
                const rawMarkdown = data.choices?.[0]?.message?.content || "No se pudo generar el análisis.";

                document.getElementById('ai-response').innerHTML = marked.parse(rawMarkdown);
                document.getElementById('input-section').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');
                updateSteps(3);

            } catch (err) {
                document.getElementById('ai-response').innerHTML = "#### Error\nNo se pudo procesar la consulta técnica.";
                document.getElementById('input-section').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                document.getElementById('btn-text').innerText = "ANALIZAR EQUIPO";
                scanLine.classList.add('hidden');
            }
        }

        function sendWhatsApp() {
            const diagnosisText = document.getElementById('ai-response').innerText;
            const text = encodeURIComponent(`Hola Altex, realicé un análisis técnico para mi ${selectedDevice}:\n\n${diagnosisText}\n\nQuisiera coordinar la reparación.`);
            window.open(`https://wa.me/5493875776632?text=${text}`, '_blank');
        }

        function directWhatsApp() {
            const text = encodeURIComponent(`Hola Altex, quisiera realizar una consulta técnica por un equipo.`);
            window.open(`https://wa.me/5493875776632?text=${text}`, '_blank');
        }

        window.onload = () => {
            document.getElementById('dynamic-tip').innerText = tips[Math.floor(Math.random() * tips.length)];
            setInterval(() => {
                const tipEl = document.getElementById('dynamic-tip');
                tipEl.style.opacity = 0;
                setTimeout(() => {
                    tipEl.innerText = tips[Math.floor(Math.random() * tips.length)];
                    tipEl.style.opacity = 1;
                }, 600);
            }, 8000);
        };
    </script>
</body>
</html>
